# ═══════════════════════════════════════════════════════
# AITest — GitHub Actions CI/CD Pipeline
# Runs on every push and pull request
# ═══════════════════════════════════════════════════════

name: AITest — Playwright CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── Step 1: Get the code ──────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2: Setup Node.js ─────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Step 3: Install dependencies ─────────────
      - name: Install dependencies
        run: npm ci

      # ── Step 4: Install Playwright browsers ──────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Step 5: Run UI tests ──────────────────────
      - name: Run UI tests
        run: npx playwright test tests/ui/ --project=chromium --reporter=list
        env:
          BASE_URL:       ${{ secrets.BASE_URL }}
          TEST_USERNAME:  ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD:  ${{ secrets.TEST_PASSWORD }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          LLM_PROVIDER:   groq
          LLM_MODEL:      llama-3.3-70b-versatile
          TEST_ENV:       ci
          LOG_LEVEL:      info

      # ── Step 6: Run API tests ─────────────────────
      - name: Run API tests
        run: npx playwright test tests/api/ --project=chromium --reporter=list
        env:
          BASE_URL:      ${{ secrets.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_ENV:      ci

      # ── Step 7: Run E2E chain tests ───────────────
      - name: Run E2E chain tests
        run: npx playwright test tests/e2e/ --project=chromium --reporter=list
        env:
          BASE_URL:      ${{ secrets.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_ENV:      ci

      # ── Step 8: Upload HTML report ────────────────
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()   # upload even if tests fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      # ── Step 9: Upload test results ───────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  # ── Second job: BDD tests ───────────────────────────
  bdd-tests:
    name: Run BDD Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run BDD tests
        run: npm run test:bdd
        env:
          BASE_URL:      ${{ secrets.BASE_URL }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          TEST_ENV:      ci